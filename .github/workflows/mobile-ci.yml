name: mobile-ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  android-smoke:
    name: android smoke build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android environment
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 "$ANDROID_SDK_ROOT/ndk" | tail -n 1)" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Android debug build
        run: npm run tauri android build -- --debug --target x86_64 --apk true

  ios-smoke:
    name: ios smoke build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Install frontend dependencies
        run: npm ci

      - name: Pick iOS simulator target
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            echo "IOS_TARGET=aarch64-sim" >> "$GITHUB_ENV"
          else
            echo "IOS_TARGET=x86_64" >> "$GITHUB_ENV"
          fi

      - name: iOS debug build
        run: npm run tauri ios build -- --debug --target $IOS_TARGET --ci --export-method debugging
