name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-desktop:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - runner: macos-latest
            rust_target: aarch64-apple-darwin
            asset_platform: macos
            asset_arch: arm64
            asset_setup_suffix: ''
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            asset_platform: macos
            asset_arch: x64
            asset_setup_suffix: ''

          # Windows
          - runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            asset_platform: windows
            asset_arch: arm64
            asset_setup_suffix: '[setup]'
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            asset_platform: windows
            asset_arch: x64
            asset_setup_suffix: '[setup]'

          # Linux
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            asset_platform: linux
            asset_arch: arm64
            asset_setup_suffix: ''
          - runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            asset_platform: linux
            asset_arch: x64
            asset_setup_suffix: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TPlayer ${{ github.ref_name }}
          releaseBody: See the assets to download this version.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.rust_target }}
          releaseAssetNamePattern: '[name]-[version]-[platform]-[arch][ext]'
