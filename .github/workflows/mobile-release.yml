name: mobile-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  upload-android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure this workflow runs on a tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android environment
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 "$ANDROID_SDK_ROOT/ndk" | tail -n 1)" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Android debug APKs per ABI
        run: npm run tauri android build -- --debug --apk --split-per-abi

      - name: Show generated APK files
        shell: bash
        run: find src-tauri/gen/android -type f -name "*.apk"

      - name: Rename APKs for release
        shell: bash
        run: |
          set -euo pipefail
      
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="TPlayer"
      
          mkdir -p release-assets
      
          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            arch=""
      
            case "$base" in
              *arm64-v8a*|*arm64*)
                arch="arm64"
                ;;
              *armeabi-v7a*|*app-arm-debug.apk*|*arm-*)
                arch="armv7"
                ;;
              *x86_64*)
                arch="x64"
                ;;
              *x86*)
                arch="x86"
                ;;
              *)
                echo "Skip unknown ABI file: $file"
                continue
                ;;
            esac
      
            cp "$file" "release-assets/${APP_NAME}-${VERSION}-android-${arch}.apk"
          done < <(find src-tauri/gen/android -type f -name "*.apk" -print0)
      
          echo "Prepared release assets:"
          ls -lah release-assets
      
      - name: Upload APKs to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.apk --clobber
